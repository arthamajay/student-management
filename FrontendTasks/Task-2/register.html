<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Institute - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom border-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img class="navbar-image" src="https://static.vecteezy.com/system/resources/previews/041/144/757/non_2x/education-logo-on-letter-v-with-graduation-hat-icon-graduation-symbol-vector.jpg" alt="Logo"/>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">    
                        <a class="nav-link" href="home.html">Home</a>
                        <a class="nav-link" href="courses.html">Courses</a>
                        <a class="nav-link" href="about.html">About</a>
                        <a class="nav-link" href="contact.html">Contact</a>
                        <a class="nav-link" href="login.html">Login</a>
                        <a class="nav-link active" href="register.html">Register</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="main-content bg-dark text-white p-5">
            <div class="container" style="max-width: 700px;">

                <div class="card p-4 text-dark shadow">
                    <h3 class="text-center mb-4 text-primary">Student Registration Form</h3>
                    
                    <form onsubmit="handleRegistration(event)">
                        
                        <div class="mb-3">
                            <label for="studentName" class="form-label fw-bold">Student Name</label>
                            <input type="text" class="form-control" id="studentName" placeholder="Enter your full name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="studentEmail" class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="studentEmail" placeholder="name@example.com" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="studentMobile" class="form-label fw-bold">Mobile Number</label>
                                <input type="tel" class="form-control" id="studentMobile" placeholder="Enter 10-digit number" pattern="[0-9]{10}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Gender</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="genderRadio" id="genderMale" value="male" required>
                                <label class="form-check-input-label" for="genderMale">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="genderRadio" id="genderFemale" value="female">
                                <label class="form-check-input-label" for="genderFemale">Female</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="genderRadio" id="genderOther" value="other">
                                <label class="form-check-input-label" for="genderOther">Other</label>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseSelect" class="form-label fw-bold">Course Selection</label>
                                <select class="form-select" id="courseSelect" required>
                                    <option value="" selected disabled>Choose a course...</option>
                                    <option value="webdev">Web Development</option>
                                    <option value="python">Python Programming</option>
                                    <option value="datascience">Data Science</option>
                                    <option value="cybersecurity">AI & ML</option>
                                    <option value="uiux">Java Programming</option>
                                    <option value="cloud">Cloud Computing</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="qualificationSelect" class="form-label fw-bold">Highest Qualification</label>
                                <select class="form-select" id="qualificationSelect" required>
                                    <option value="" selected disabled>Select your qualification...</option>
                                    <option value="highschool">High School</option>
                                    <option value="undergraduate">Undergraduate Degree</option>
                                    <option value="postgraduate">Postgraduate Degree</option>
                                    <option value="diploma">Diploma</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="addressInput" class="form-label fw-bold">Address</label>
                            <textarea class="form-control" id="addressInput" rows="3" placeholder="Enter your complete home address" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="resumeUpload" class="form-label fw-bold">Upload Resume (PDF/Docx)</label>
                            <input class="form-control" type="file" id="resumeUpload" accept=".pdf,.doc,.docx" required>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                <label class="form-check-label text-muted small" for="termsCheck">
                                    I agree to the terms and conditions of the training institute.
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Submit Registration</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function handleRegistration(event) {
            event.preventDefault();
            alert("Registration successful! Thank you for signing up.");
        }
    </script>
</body>
</html>
