<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Institute - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css"> </head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="home.html">
                    <img class="navbar-image" src="https://static.vecteezy.com/system/resources/previews/041/144/757/non_2x/education-logo-on-letter-v-with-graduation-hat-icon-graduation-symbol-vector.jpg" alt="Logo"/>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">    
                        <a class="nav-link" href="home.html">Home</a>
                        <a class="nav-link" href="courses.html">Courses</a>
                        <a class="nav-link" href="aboutus.html">About</a>
                        <a class="nav-link" href="contact.html">Contact</a>
                        <a class="nav-link active" href="login.html">Login</a>
                        <a class="nav-link" href="register.html">Register</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="main-content bg-dark text-white p-5">
            <div class="container" style="max-width: 500px;">
                
                <div id="loginAlert" class="alert alert-success alert-dismissible fade d-none" role="alert">
                    <strong>Welcome Back!</strong> Login successful. Redirecting to your dashboard...
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card p-4 text-dark shadow mt-4">
                    <h3 class="text-center mb-4 text-primary">Student Login</h3>
                    
                    <form onsubmit="handleLogin(event)">
                        
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                            <label for="loginEmail">Email Address</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                            <label for="loginPassword">Password</label>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small text-primary">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Sign In</button>
                        
                        <div class="text-center">
                            <span class="small text-muted">Don't have an account? </span>
                            <a href="register.html" class="text-decoration-none small fw-bold text-primary">Register Here</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            alert("Login successful! Redirecting to dashboard...");
        }
    </script>
</body>
</html>
