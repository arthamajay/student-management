<!DOCTYPE html>
<html>
    <head>
        <title>Add Student</title>
        <link rel="stylesheet" href="common.css">
    </head>
    </head>
    <body>     
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="addStudent.html">Add Student</a>
            <a href="viewStudent.html">View Students</a>
            <a href="logout.html">Logout</a>
        </nav>
        <h1>Add Student</h1>  
        <form action="viewStudent.html" method="get">
            <label for="rollno">Roll No:</label>
            <input type="text" id="rollno" required/><br/><br/>

            <label for="name">Name:</label>
            <input type="text" id="name" required/><br/><br/>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required/><br/><br/>
            
            <label for="age">Age:</label>
            <input type="number" id="age" required/><br/><br/>
     
            <label for="cgpa">CGPA:</label>
            <input type="number" id="cgpa" step="0.01" required/><br/><br/>
            
            <input type="submit" value="Add Student" class="button"/><br/><br/>
        </form>
    </body>
</html>
