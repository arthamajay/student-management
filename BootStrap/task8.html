<!DOCTYPE html>
<html>
    <head>
        <title> Task - 8 </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cloudflare.com">
    </head>
    <body>
        <form class="p-4 m-5 bg-warning rounded">
            <div class="input-group mb-3">
                <span class="input-group-text">@</span>
                <input class="form-control" id="username" type="text" placeholder="Enter Username"/>
            </div>
            <div class="input-group mb-3">
                <input class="form-control" id="email" type="email" placeholder="Enter Email"/>
                <span class="input-group-text">@example.com</span>
            </div>
            <div class="input-group">
                <input class="form-control" id="password" type="password" placeholder="Enter Password"/>
            </div>
            <input type="submit" class="btn btn-primary mt-3"/>
        </form>
        <h1 class="ms-5">Floating Form</h1>
        <div class="p-4 m-5 bg-warning rounded">
            <div class="form-floating mb-3"> 
                <input class="form-control" type="text" id="username" placeholder="Enter Username"/>
                <label for="username">Enter Username</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Enter Email"/>
                <label for="email">Enter Email</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Enter Password"/>
                <label for="password">Enter Password</label>
            </div>
            <button class="btn btn-primary">Submit</button>
        </div>
    </body>
</html>
