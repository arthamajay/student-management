<!DOCTYPE html>
<html>
    <head>
        <title>Edit Student</title>
        <link rel="stylesheet" href="common.css">
    </head>
    <body>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="addStudent.html">Add Student</a>
            <a href="viewStudent.html">View Students</a>
            <a href="logout.html">Logout</a>
        </nav>
        <h1>Edit Student</h1>
        <form onsubmit="updateStudent(event)">
            <label for="rollno">Roll No:</label>
            <input type="text" id="rollno" required disabled /><br/><br/>

            <label for="name">Name:</label>
            <input type="text" id="name" required /><br/><br/>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required /><br/><br/>
            
            <label for="age">Age:</label>
            <input type="number" id="age" required /><br/><br/>

            <label for="cgpa">CGPA:</label>
            <input type="number" id="cgpa" step="0.01" required /><br/><br/>

            <input type="submit" value="Update Student" class="button"/><br/><br/>
    </body>
    <script>

        window.onload=function (){
            renderStudent()
        }

        function renderStudent(){
            let student=JSON.parse(localStorage.getItem("editStudent"));
            const rollno=document.getElementById("rollno");
            rollno.value=student.rollno;
            const name=document.getElementById("name");
            name.value=student.name;
            const email=document.getElementById("email");
            email.value=student.email;
            const age=document.getElementById("age");
            age.value=student.age;
            const cgpa=document.getElementById("cgpa");
            cgpa.value=student.cgpa;
        }

        function updateStudent(event){
            event.preventDefault();
            let students=JSON.parse(localStorage.getItem("students"));
            const rollno=document.getElementById("rollno").value;
            const name=document.getElementById("name").value;
            const email=document.getElementById("email").value;
            const age=document.getElementById("age").value;
            const cgpa=document.getElementById("cgpa").value;

            let studentObj={
                rollno:rollno,
                name:name,
                email:email,
                age:age,
                cgpa:cgpa
            }

            let newStudents=[];
            for(let student of students){
                if(student.rollno!==rollno){
                    newStudents.push(student);
                }
            }
            newStudents.push(studentObj);
            localStorage.setItem("students",JSON.stringify(newStudents));
            window.location.href="viewStudent.html";
        }
    </script>
</html>
