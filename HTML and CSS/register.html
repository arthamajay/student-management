<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link rel="stylesheet" href="common.css">
    </head>
    <body>
         <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
        <h1>Register</h1>
        <form onsubmit="register(event)">
            <label for="username">Username:</label>
            <input type="text" id="username" required/><br/><br/>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required/><br/><br/>
            
            <label for="password">Password:</label>
            <input type="password" id="password" required/><br/><br/>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" required/><br/><br/>

            <input type="submit" value="Register" class="button"/><br/><br/>

            <label>Already have an account? <a href="login.html">Login here</a></label>
        </form>
    </body>
    <script>
        function register(event) {
            event.preventDefault();
            const user=document.getElementById("username").value;
            const email=document.getElementById("email").value;
            const pass=document.getElementById("password").value;
            const cpass=document.getElementById("confirm_password").value;

            if(pass!==cpass) {
                alert("Passwords do not match");
                return;
            }
            var obj={
                "name":user,
                "email":email,
                "pass":pass
            };

            localStorage.setItem("user",JSON.stringify(obj));
            window.location.href="login.html";
        }
    </script>
</html>
