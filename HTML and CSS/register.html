<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link rel="stylesheet" href="common.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
         <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
        <h1>Register</h1>
        <form onsubmit="register(event)">
            <label for="username" class="form-label">Username:</label>
            <input type="text" id="username" class="form-control" required/><br/>
            
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" class="form-control" required/><br/>
            
            <label for="password" class="form-label">Password:</label>
            <input type="password" id="password" class="form-control" required/><br/>

            <label for="confirm_password" class="form-label">Confirm Password:</label>
            <input type="password" id="confirm_password" class="form-control" required/><br/>

            <input type="submit" value="Register" class="button"/><br/><br/>

            <p id="errorMsg" style="color: white;"></p>

            <label>Already have an account? <a href="login.html">Login here</a></label>
        </form>
    </body>
    <script>
        function register(event) {
            event.preventDefault();
            const user=document.getElementById("username").value;
            const email=document.getElementById("email").value;
            const pass=document.getElementById("password").value;
            const cpass=document.getElementById("confirm_password").value;

            const errorMsg=document.getElementById("errorMsg");
            
            const userRegEx=/^[a-z|A-Z]{8,}$/;

            if(!userRegEx.test(user)){
                errorMsg.textContent="Username should be of 8 characters minimum";
                return;
            }
            
            var obj={
                "name":user,
                "email":email,
                "pass":pass
            };

            localStorage.setItem("user",JSON.stringify(obj));
            window.location.href="login.html";
        }
    </script>
</html>
