<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="common.css">
    </head>
    <body>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
        <h1>Login</h1>
        <form onsubmit="login(event)">
            <label for="username">Username:</label>
            <input type="username" id="username" required /><br/><br/>
            
            <label for="password">Password:</label>
            <input type="password" id="password" required /><br/><br/>

            <input type="submit" value="Login" class="button"/><br/><br/>
        </form>
    </body>
    <script>
        async function login(event) {
            event.preventDefault();

            const usernameInput = document.getElementById("username").value;
            const passwordInput = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg"); 

            const loginPayload = {
                "username": usernameInput,
                "password": passwordInput
            };

            try {
                const result = await fetch("http://localhost:8080/users/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(loginPayload)
                });

                if (result.ok) { 
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid username or password.");
                }
            } catch (error) {
                console.error("Network error:", error);
                alert("Cannot connect to backend server. Make sure Spring Boot is running on port 8080.");
            }
        }

    </script>
</html>
