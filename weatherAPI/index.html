<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather API</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="main-container d-flex flex-column align-items-center">
        <h1>Weather Information</h1>
        <div class="input-container d-flex flex-column align-items-center card p-4">
            <label class="form-label text-dark" for="city">Enter City : </label>
            <input class="form-control" type="search" id="city">
            <h3 class="temp">Temperature in <span id="cityText" class="text-primary"></span> is:<span id="temperature" class="text-warning"></span><sup class="text-dark">o</sup>C</h3>
            <input type="submit" class="btn btn-danger" value="Get Temperature" id="tempButton"/>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
