<!DOCTYPE html>
<html>
    <head>
        <title>Task 11</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{
                display:flex;
                justify-content:center;
            }
            .h{
                display:inline-block;
                animation:first 2s linear infinite alternate;
            }
            @keyframes first{
                from{
                    transform:translateY(0px);
                }
                to{
                    transform:translateY(100px);
                }
            }
            .e{
                display:inline-block;
                animation:second 2s linear infinite alternate 0.5s;
            }
            @keyframes second{
                from{
                    transform:translateY(0px);
                }
                to{
                    transform:translateY(100px);
                }
            }
            .l{
                display:inline-block;
                animation:second 2s linear infinite alternate 1s;
            }
            @keyframes second{
                from{
                    transform:translateY(0px);
                }
                to{
                    transform:translateY(100px);
                }
            }
            .l2{
                display:inline-block;
                animation:second 2s linear infinite alternate 1.5s;
            }
            @keyframes second{
                from{
                    transform:translateY(0px);
                }
                to{
                    transform:translateY(100px);
                }
            }
            .o{
                display:inline-block;
                animation:second 2s linear infinite alternate 2s;
            }
            @keyframes second{
                from{
                    transform:translateY(0px);
                }
                to{
                    transform:translateY(100px);
                }
            }
        </style>
    </head>
    <body>
        <p><span class="h">H</span><span class="e">E</span><span class="l">L</span><span class="l2">L</span><span class="o">O</span></p>
    </body>
</html>
