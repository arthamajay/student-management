<!DOCTYPE html>
<html>
    <head>
        <title>Task 10</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>

            div{
                width:50px;
                height:50px;
                background-color:black;
                border-radius:50%;
                animation:move 5s infinite ease;
            }
            @keyframes move{
                0%{
                    transform:translateX(0px);
                }
                50%{
                    transform:translateX(100vw);
                }
                100%{
                    transform:translateX(0px);
                }
            }
        </style>
    </head>
    <body>
        <h1>Task 10</h1>
        <div></div>
    </body>
</html>
